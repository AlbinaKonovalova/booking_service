services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/booking_service?sslmode=disable
      - SERVER_PORT=8080
      - LOG_LEVEL=info
      - HOTEL_TIMEZONE=UTC
      - EXPIRATION_INTERVAL=30s
      - COMPLETION_TIME=11:50
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=booking_service
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: ["postgres://postgres:postgres@db:5432/booking_service?sslmode=disable", "up"]

volumes:
  postgres_data: