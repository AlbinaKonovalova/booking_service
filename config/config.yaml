server:
  port: ${SERVER_PORT:8080}
  read_timeout: ${SERVER_READ_TIMEOUT:10s}
  write_timeout: ${SERVER_WRITE_TIMEDOWN:10s}
  shutdown_timeout: ${SERVER_SHUTDOWN_TIMEDOWN:5s}

database:
  url: ${DATABASE_URL:postgres://postgres@localhost:5432/<base>?sslmode=disable"
  max_open_conns: ${DB_MAX_OPEN_CONNS:25}
  max_idle_conns: ${DB_MAX_IDLE_CONNS:5}
  conn_max_lifetime: ${DB_CONNS_MAX_LIFETIME:5m}

cache:
  ttl: ${CACHE_TTL:5m}

log:
  level: ${LOG_LEVEL:info}
  format: ${LOG_FORMAT:json}