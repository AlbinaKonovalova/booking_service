server:
  port: 8080
  read_timeout: 10s
  write_timeout: 10s
  shutdown_timeout: 5s

database:
  url: postgres://postgres:postgres@localhost:5432/booking_service?sslmode=disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

hotel:
  timezone: UTC

log:
  level: info
  format: json

scheduler:
  expiration_interval: 5m
  completion_time: "11:50"